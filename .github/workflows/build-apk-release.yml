name: Build APK and Publish Release

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
      - 'release-*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build APK and upload to GitHub Releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate Android wrapper project
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p android-build/app/src/main/java/com/example/termuxdocker
          mkdir -p android-build/app/src/main/assets

          [ -f alpine.sh ] && cp alpine.sh android-build/app/src/main/assets/alpine.sh
          [ -f README.md ] && cp README.md android-build/app/src/main/assets/README.md

          cat > android-build/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'TermuxDockerWrapper'
          include ':app'
          EOF

          cat > android-build/build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > android-build/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.example.termuxdocker'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.example.termuxdocker'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          cat > android-build/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <queries>
                  <package android:name="com.termux" />
              </queries>
              <application
                  android:theme="@style/AppTheme"
                  android:label="Termux Docker"
                  android:allowBackup="false"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          mkdir -p android-build/app/src/main/res/values
          cat > android-build/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:colorAccent">#1565C0</item>
              </style>
          </resources>
          EOF

          cat > android-build/app/src/main/java/com/example/termuxdocker/MainActivity.java <<'EOF'
          package com.example.termuxdocker;

          import android.app.Activity;
          import android.os.Bundle;
          import android.content.ClipData;
          import android.content.ClipboardManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Typeface;
          import android.net.Uri;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;
          import java.io.BufferedReader;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.nio.charset.StandardCharsets;

          public class MainActivity extends Activity {
              private static final String INSTALL_COMMAND = "bash <(curl -fsSL https://raw.githubusercontent.com/ivansslo/termux-docker/main/alpine.sh)";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  ScrollView scrollView = new ScrollView(this);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(40, 48, 40, 48);
                  scrollView.addView(root);

                  TextView title = new TextView(this);
                  title.setText("Termux Docker Installer");
                  title.setTextSize(24);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  root.addView(title);

                  TextView desc = new TextView(this);
                  desc.setText("APK wrapper untuk repo termux-docker. Install Termux terlebih dahulu, lalu jalankan command installer di Termux.");
                  desc.setTextSize(16);
                  desc.setPadding(0, 24, 0, 24);
                  root.addView(desc);

                  TextView cmd = new TextView(this);
                  cmd.setText(INSTALL_COMMAND);
                  cmd.setTextSize(14);
                  cmd.setTypeface(Typeface.MONOSPACE);
                  cmd.setPadding(24, 24, 24, 24);
                  root.addView(cmd);

                  Button copyCommand = new Button(this);
                  copyCommand.setText("Copy install command");
                  copyCommand.setAllCaps(false);
                  copyCommand.setOnClickListener(v -> copy("Install command", INSTALL_COMMAND));
                  root.addView(copyCommand);

                  Button copyScript = new Button(this);
                  copyScript.setText("Copy alpine.sh from APK assets");
                  copyScript.setAllCaps(false);
                  copyScript.setOnClickListener(v -> copy("alpine.sh", readAsset("alpine.sh")));
                  root.addView(copyScript);

                  Button openTermux = new Button(this);
                  openTermux.setText("Open Termux");
                  openTermux.setAllCaps(false);
                  openTermux.setOnClickListener(v -> openTermux());
                  root.addView(openTermux);

                  setContentView(scrollView);
              }

              private void copy(String label, String text) {
                  ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                  clipboard.setPrimaryClip(ClipData.newPlainText(label, text == null ? "" : text));
                  Toast.makeText(this, label + " copied", Toast.LENGTH_SHORT).show();
              }

              private String readAsset(String name) {
                  try (InputStream is = getAssets().open(name);
                       BufferedReader br = new BufferedReader(new InputStreamReader(is, StandardCharsets.UTF_8))) {
                      StringBuilder sb = new StringBuilder();
                      String line;
                      while ((line = br.readLine()) != null) sb.append(line).append('\n');
                      return sb.toString();
                  } catch (Exception e) {
                      return "Asset not found: " + name;
                  }
              }

              private void openTermux() {
                  PackageManager pm = getPackageManager();
                  Intent intent = pm.getLaunchIntentForPackage("com.termux");
                  if (intent != null) {
                      startActivity(intent);
                  } else {
                      startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse("https://github.com/termux/termux-app/releases")));
                  }
              }
          }
          EOF

      - name: Build APK
        working-directory: android-build
        run: gradle assembleDebug

      - name: Prepare release files
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_NAME="Termux Docker ${GITHUB_REF_NAME}"
            PRERELEASE="false"
            APK_NAME="termux-docker-wrapper-${GITHUB_REF_NAME}.apk"
          else
            RELEASE_TAG="auto-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_NAME="Termux Docker Auto Build ${GITHUB_RUN_NUMBER}"
            PRERELEASE="true"
            APK_NAME="termux-docker-wrapper-auto-${GITHUB_RUN_NUMBER}-${SHORT_SHA}.apk"
          fi

          cp android-build/app/build/outputs/apk/debug/app-debug.apk "artifacts/${APK_NAME}"

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=${RELEASE_NAME}"
            echo "prerelease=${PRERELEASE}"
            echo "apk_path=artifacts/${APK_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact to Actions
        uses: actions/upload-artifact@v4
        with:
          name: termux-docker-wrapper-apk
          path: ${{ steps.prep.outputs.apk_path }}

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.release_tag }}
          name: ${{ steps.prep.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.prep.outputs.prerelease }}
          files: ${{ steps.prep.outputs.apk_path }}
          body: |
            APK otomatis dari GitHub Actions.

            Commit: ${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
